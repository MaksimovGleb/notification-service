services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_app
    restart: unless-stopped
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
      - rabbitmq
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notification_service
      DB_USERNAME: postgres
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      QUEUE_CONNECTION: rabbitmq
    healthcheck:
      test: ["CMD", "php", "artisan", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_worker
    restart: unless-stopped
    entrypoint: ["php", "artisan", "queue:work", "rabbitmq", "--queue=high,default", "--tries=3", "--backoff=10,30,60"]
    volumes:
      - .:/var/www
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notification_service
      DB_USERNAME: postgres
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      QUEUE_CONNECTION: rabbitmq

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_scheduler
    restart: unless-stopped
    entrypoint: ["php", "artisan", "schedule:work"]
    volumes:
      - .:/var/www
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notification_service
      DB_USERNAME: postgres
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      QUEUE_CONNECTION: rabbitmq

  nginx:
    image: nginx:alpine
    container_name: notification_nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:15-alpine
    container_name: notification_db
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: notification_redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: notification_rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
